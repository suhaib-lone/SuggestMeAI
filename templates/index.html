<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ app_title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700;800&display=swap');

    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #2b313c;
      --text: #f3f6fb;
      --muted: #9aa4b2;
      --accent: #7dd3fc;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0b0f14 0%, var(--bg) 100%);
      padding: 24px;
      display: grid;
      place-items: center;
    }

    .hero {
      width: min(980px, 100%);
      padding: 48px;
      border-radius: 28px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(125, 211, 252, 0.08);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin-top: 22px;
      font-family: "Sora", sans-serif;
      font-size: clamp(3rem, 8vw, 5.6rem);
      line-height: 0.95;
      max-width: 760px;
    }

    .lead {
      margin-top: 18px;
      max-width: 620px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1.05rem;
    }

    .actions {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
    }

    .cta {
      min-height: 56px;
      padding: 0 22px;
      border: none;
      border-radius: 999px;
      background: var(--text);
      color: #0b0f14;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease;
    }

    .cta:hover {
      transform: translateY(-2px);
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .hero {
        padding: 28px;
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <span class="eyebrow">SuggestMe.AI</span>
    <h1>Better suggestions, with less noise.</h1>
    <p class="lead">
      Ask for an idea, tool, resource, or learning path and get a focused AI-generated answer in one clean thread.
    </p>
    <div class="actions">
      <form method="get" action="/generate">
        <button class="cta" type="submit">Start</button>
      </form>
      <span class="meta">{{ selected_model }}</span>
    </div>
  </main>
</body>
</html>
